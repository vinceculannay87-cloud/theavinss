<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Countdown · For My Love</title>
<meta name="description" content="A premium romantic story made just for you.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Inter:wght@300;400;500;600&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>

<section class="container">
  <h1 class="page-title">Our Countdown</h1>
  <p class="page-subtitle" id="cd-label">Counting every moment with you.</p>
  <div class="countdown">
    <div class="glass cell"><div class="num" id="cd-d">0</div><div class="lbl">Days</div></div>
    <div class="glass cell"><div class="num" id="cd-h">00</div><div class="lbl">Hours</div></div>
    <div class="glass cell"><div class="num" id="cd-m">00</div><div class="lbl">Minutes</div></div>
    <div class="glass cell"><div class="num" id="cd-s">00</div><div class="lbl">Seconds</div></div>
  </div>
</section>

</main>
<footer>Crafted with love &mdash; for Althea Nicole</footer>
<script src="script.js"></script>
<script>initCountdown('2026-04-02T00:00:00');</script>
</body>
</html>
